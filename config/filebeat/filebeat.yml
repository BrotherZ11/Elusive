filebeat.inputs:
  - type: filestream
    id: wazuh-alerts
    enabled: true
    paths:
      - /var/ossec/logs/alerts/alerts.json
    parsers:
      - ndjson:
          overwrite_keys: true

output.elasticsearch:
  hosts: ["http://siem:9200"]
  index: "wazuh-alerts-%{+yyyy.MM.dd}"

setup.template.enabled: true
setup.ilm.enabled: false

logging.level: info
