[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf
    storage.path  /var/fluent-bit/state

[INPUT]
    Name              tail
    Tag               dmz.web
    Path              /var/log/apache2/access.log,/var/log/apache2/error.log
    Read_from_Head    true
    Refresh_Interval  5
    Parser            apache2
    DB                /var/fluent-bit/state/web.db

[INPUT]
    Name              tail
    Tag               dmz.honeypot
    Path              /var/log/cowrie/cowrie.json
    Read_from_Head    true
    Refresh_Interval  5
    Parser            json
    DB                /var/fluent-bit/state/honeypot.db

[INPUT]
    Name              tail
    Tag               dmz.proxy
    Path              /var/log/nginx/access.log,/var/log/nginx/error.log
    Read_from_Head    true
    Refresh_Interval  5
    Parser            apache2
    DB                /var/fluent-bit/state/proxy.db

[INPUT]
    Name              tail
    Tag               dmz.ips
    Path              /var/log/suricata/eve.json
    Read_from_Head    true
    Refresh_Interval  5
    Parser            json
    DB                /var/fluent-bit/state/ips.db

[FILTER]
    Name          modify
    Match         dmz.*
    Add           zone dmz
    Add           forwarded_by fluent-bit

[OUTPUT]
    Name          loki
    Match         dmz.*
    Host          logs
    Port          3100
    Labels        job=dmz-forwarder,tag=$TAG,zone=dmz,forwarded_by=fluent-bit
    Line_Format   json
    Auto_Kubernetes_Labels off
