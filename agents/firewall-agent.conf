<ossec_config>
  <client>
    <server>
      <address>wazuh.manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
  </client>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>
</ossec_config>

<ossec_config>
  <active-response>
    <disabled>no</disabled>
    <repeated_offenders>5,15,30</repeated_offenders>
  </active-response>
</ossec_config>
