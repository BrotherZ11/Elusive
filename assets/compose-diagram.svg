  <text x="610" y="415" text-anchor="middle" class="label">ldap</text>
  <text x="610" y="438" text-anchor="middle" class="small">image: osixia/openldap:1.5.0</text>
  <text x="610" y="459" text-anchor="middle" class="ip">172.31.0.30</text>

