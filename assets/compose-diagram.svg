  <text x="1135" y="785" text-anchor="middle" class="small">image: python:3.11-slim</text>
  <text x="1135" y="806" text-anchor="middle" class="ip">172.32.0.40</text>

  <rect x="1280" y="730" width="230" height="100" class="box"/>
  <text x="1395" y="762" text-anchor="middle" class="label">database</text>
  <text x="1395" y="785" text-anchor="middle" class="small">image: postgres:16-alpine</text>
  <text x="1395" y="806" text-anchor="middle" class="ip">172.32.0.60</text>

  <rect x="640" y="842" width="610" height="48" class="box"/>
  <text x="945" y="871" text-anchor="middle" class="small">proxy.agent | agenteia.agent</text>

  <rect x="1080" y="610" width="360" height="98" class="box"/>
  <text x="1260" y="642" text-anchor="middle" class="label">Wazuh SIEM</text>
