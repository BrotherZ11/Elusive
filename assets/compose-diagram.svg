<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .zone-title { font: 700 26px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .label { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 500 15px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .ip { font: 500 14px 'Consolas', monospace; fill: #475569; }
      .box { fill: #ffffff; stroke: #94a3b8; stroke-width: 2; rx: 22; ry: 22; }
      .zone { fill: #f8fafc; stroke: #0f172a; stroke-width: 2; rx: 26; ry: 26; }
      .edge { stroke: #334155; stroke-width: 3; fill: none; }
      .dot { fill: #16a34a; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f1f5f9"/>
  <text x="800" y="48" text-anchor="middle" class="title">Elusive Lab Docker Compose</text>
  <text x="800" y="78" text-anchor="middle" class="subtitle">Servicios, zonas de red e imagen Docker usada por cada nodo</text>

  <rect x="620" y="95" width="360" height="110" class="zone"/>
  <text x="800" y="128" text-anchor="middle" class="zone-title">EDGE</text>
