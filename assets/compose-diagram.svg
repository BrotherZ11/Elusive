  <text x="325" y="415" text-anchor="middle" class="label">web</text>
  <text x="325" y="438" text-anchor="middle" class="small">image: vulnerables/web-dvwa:latest</text>
  <text x="325" y="459" text-anchor="middle" class="ip">172.31.0.20</text>

