%YAML 1.1
---
vars:
  address-groups:
    HOME_NET: "[172.31.0.0/24,172.32.0.0/24]"
    EXTERNAL_NET: "!$HOME_NET"
    DMZ_NET: "[172.31.0.0/24]"
    BACKEND_NET: "[172.32.0.0/24]"
  port-groups:
    HTTP_PORTS: "80"
    SSH_PORTS: "2222,2223"
    LDAP_PORTS: "389"

default-rule-path: /var/lib/suricata/rules

rule-files:
  - local.rules

af-packet:
  - interface: eth0
    cluster-id: 90
    cluster-type: cluster_flow
    defrag: yes
  - interface: eth1
    cluster-id: 91
    cluster-type: cluster_flow
    defrag: yes

outputs:
  - fast:
      enabled: yes
      filename: fast.log
      append: yes
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      community-id: true
      xff:
        enabled: no
      types:
        - alert:
            tagged-packets: yes
        - http:
            extended: yes
        - dns:
        - tls:
        - flow:
        - stats:
            totals: yes
            threads: no

logging:
  default-log-level: info

app-layer:
  protocols:
    http:
      enabled: yes
    tls:
      enabled: yes
    ssh:
      enabled: yes
    dns:
      enabled: yes
