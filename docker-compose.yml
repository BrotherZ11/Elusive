services:
  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.4
    hostname: wazuh.manager
    restart: always
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 655360
        hard: 655360
    ports:
      - "1514:1514"
      - "1514:1514/udp"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      - INDEXER_URL="https://wazuh.indexer:9200"
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./config/wazuh_cluster/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml:ro
      - ./config/wazuh_cluster/local_rules.xml:/var/ossec/etc/rules/local_rules.xml:ro
    networks:
      - soc_net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.4
    hostname: wazuh.indexer
    restart: always
    ports:
      - "9200:9200"
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/config/opensearch-security/internal_users.yml
    networks:
      - soc_net

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.14.4
    hostname: wazuh.dashboard
    restart: always
    ports:
      - 5601:5601
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      - wazuh.indexer
    links:
      - wazuh.indexer:wazuh.indexer
      - wazuh.manager:wazuh.manager
    networks:
      - soc_net

  endpoint:
    image: linuxserver/openssh-server:latest
    container_name: endpoint
    restart: always
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SUDO_ACCESS=true
      - PASSWORD_ACCESS=true
      - USER_NAME=student
      - USER_PASSWORD=student123
    ports:
      - "2223:2222"
    volumes:
      - endpoint_logs:/var/log
      - endpoint_config:/config
    networks:
      - soc_net

  endpoint.agent:
    image: wazuh/wazuh-agent:4.14.4
    container_name: endpoint-agent
    hostname: endpoint-agent
    restart: always
    environment:
      - WAZUH_MANAGER=wazuh.manager
      - WAZUH_AGENT_NAME=endpoint-agent
    volumes:
      - ./config/agents/endpoint-agent.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - endpoint_agent_etc:/var/ossec/etc
      - endpoint_config:/endpoint-config:ro
    depends_on:
      - wazuh.manager
      - endpoint
    networks:
      - soc_net

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: dvwa
    restart: always
    ports:
      - "8080:80"
    volumes:
      - dvwa_logs:/var/log/apache2
    networks:
      - soc_net

  dvwa.agent:
    image: wazuh/wazuh-agent:4.14.4
    container_name: dvwa-agent
    hostname: dvwa-agent
    restart: always
    environment:
      - WAZUH_MANAGER=wazuh.manager
      - WAZUH_AGENT_NAME=dvwa-agent
    volumes:
      - ./config/agents/dvwa-agent.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - dvwa_agent_etc:/var/ossec/etc
      - dvwa_logs:/var/log/dvwa:ro
    depends_on:
      - wazuh.manager
      - dvwa
    networks:
      - soc_net

  honeypot:
    image: cowrie/cowrie:latest
    container_name: honeypot
    restart: always
    ports:
      - "2222:2222"
      - "2224:2223"
    volumes:
      - cowrie_logs:/cowrie/cowrie-git/var/log/cowrie
    networks:
      - soc_net

  honeypot.agent:
    image: wazuh/wazuh-agent:4.14.4
    container_name: honeypot-agent
    hostname: honeypot-agent
    restart: always
    environment:
      - WAZUH_MANAGER=wazuh.manager
      - WAZUH_AGENT_NAME=honeypot-agent
    volumes:
      - ./config/agents/honeypot-agent.conf:/wazuh-config-mount/etc/ossec.conf:ro
      - honeypot_agent_etc:/var/ossec/etc
      - cowrie_logs:/var/log/cowrie:ro
    depends_on:
      - wazuh.manager
      - honeypot
    networks:
      - soc_net

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
  endpoint_logs:
  endpoint_config:
  endpoint_agent_etc:
  dvwa_logs:
  dvwa_agent_etc:
  cowrie_logs:
  honeypot_agent_etc:

networks:
  soc_net:
    driver: bridge
